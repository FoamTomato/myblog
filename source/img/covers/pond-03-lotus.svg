<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="c3bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0" stop-color="#e0eaea"/>
      <stop offset="0.6" stop-color="#cadedd"/>
      <stop offset="1" stop-color="#b6d0cf"/>
    </linearGradient>
    <radialGradient id="c3glow" cx="0.4" cy="0.7" r="0.7">
      <stop offset="0" stop-color="#18aa98" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#18aa98" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="c3pad" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#1a8f82"/>
      <stop offset="1" stop-color="#0e6f66"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#c3bg)"/>
  <rect width="1200" height="800" fill="url(#c3glow)"/>

  <!-- 荷叶 A(大,带缺口),整体轻微浮动 -->
  <g transform="translate(360,440)">
    <animateTransform attributeName="transform" type="translate" dur="8s" repeatCount="indefinite"
      values="360,440; 372,452; 360,440" additive="sum"/>
    <path d="M0,0 A150,150 0 1 1 30,-8 L8,0 Z" fill="url(#c3pad)" fill-opacity="0.9"/>
    <g stroke="#0b5f57" stroke-opacity="0.4" stroke-width="2" fill="none">
      <path d="M0,0 L-120,-80"/><path d="M0,0 L-130,20"/><path d="M0,0 L-70,120"/>
      <path d="M0,0 L60,110"/><path d="M0,0 L130,40"/><path d="M0,0 L100,-90"/>
    </g>
  </g>

  <!-- 荷叶 B(小) -->
  <g transform="translate(820,320)">
    <animateTransform attributeName="transform" type="translate" dur="10s" repeatCount="indefinite"
      values="820,320; 810,332; 820,320" additive="sum"/>
    <path d="M0,0 A95,95 0 1 1 20,-6 L6,0 Z" fill="url(#c3pad)" fill-opacity="0.85"/>
    <g stroke="#0b5f57" stroke-opacity="0.38" stroke-width="1.6" fill="none">
      <path d="M0,0 L-78,-46"/><path d="M0,0 L-82,30"/><path d="M0,0 L-30,80"/>
      <path d="M0,0 L50,66"/><path d="M0,0 L82,10"/>
    </g>
  </g>

  <!-- 荷花(粉红),缓慢呼吸 -->
  <g transform="translate(880,300)">
    <animateTransform attributeName="transform" type="scale" dur="7s" repeatCount="indefinite"
      values="1;1.06;1" additive="sum"/>
    <g fill="#ee9ebe" fill-opacity="0.7">
      <ellipse cx="0" cy="-30" rx="14" ry="34"/>
      <ellipse cx="-26" cy="-12" rx="14" ry="32" transform="rotate(-40)"/>
      <ellipse cx="26" cy="-12" rx="14" ry="32" transform="rotate(40)"/>
    </g>
    <g fill="#e26e9e" fill-opacity="0.75">
      <ellipse cx="0" cy="-20" rx="10" ry="24"/>
      <ellipse cx="-16" cy="-10" rx="10" ry="22" transform="rotate(-30)"/>
      <ellipse cx="16" cy="-10" rx="10" ry="22" transform="rotate(30)"/>
    </g>
    <circle cx="0" cy="-12" r="8" fill="#f0d06e" fill-opacity="0.9"/>
  </g>

  <!-- 水面涟漪 -->
  <g stroke="#0e7c88" fill="none" stroke-width="2">
    <circle cx="560" cy="600" r="8" stroke-opacity="0.4">
      <animate attributeName="r" dur="5.5s" repeatCount="indefinite" values="8;90"/>
      <animate attributeName="stroke-opacity" dur="5.5s" repeatCount="indefinite" values="0.4;0"/>
    </circle>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="喵喵鱼塘">
  <!-- 深青墨圆角衬底:强对比,深浅标签栏都清晰 -->
  <rect width="64" height="64" rx="14" fill="#0a3a42"/>
  <!-- 水塘暗示:底部一道青绿水波(16px 时融为底色不碍事,32px+ 才见) -->
  <path d="M0 48 Q16 43 32 48 T64 48 L64 64 L0 64 Z" fill="#12969e" opacity="0.9"/>
  <path d="M0 54 Q18 50 34 54 T64 54 L64 64 L0 64 Z" fill="#18aa98" opacity="0.55"/>
  <!-- 猫头大剪影:圆头 + 两只尖耳,占满画面,极简无碎线 -->
  <g fill="#d6e2e4">
    <path d="M15 24 L12 8 L28 19 Z"/>
    <path d="M49 24 L52 8 L36 19 Z"/>
    <path d="M32 17 C44 17 51 26 51 36 C51 47 42 53 32 53 C22 53 13 47 13 36 C13 26 20 17 32 17 Z"/>
  </g>
  <!-- 两只大眼:青墨,大而清晰,16px 也认得出 -->
  <g fill="#0a3a42">
    <ellipse cx="24" cy="35" rx="3.4" ry="4.6"/>
    <ellipse cx="40" cy="35" rx="3.4" ry="4.6"/>
  </g>
  <!-- 一抹暖橘鼻:唯一暖色点睛,小面积 -->
  <path d="M32 42 L28.5 45 Q32 48.5 35.5 45 Z" fill="#e8663a"/>
</svg>

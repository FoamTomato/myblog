name: Sync COS posts & publish blog

on:
  schedule:
    # 每天 UTC 18:00 = 北京时间次日 02:00 拉取一次
    - cron: '0 18 * * *'
  workflow_dispatch:      # 支持手动触发
    inputs:
      force_publish:
        description: '强制 build+部署(跳过 COS 变更检测,用于配置/主题/脚本改动)'
        type: boolean
        default: false

concurrency:
  group: blog-publish
  cancel-in-progress: false

jobs:
  sync-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 需要 push 回状态文件

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install COS SDK
        run: pip install cos-python-sdk-v5

      - name: Sync posts from COS (dedup)
        id: sync
        env:
          COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
          COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
          COS_REGION: ap-hongkong
          COS_BUCKET: xiaohang-1403701833
          COS_PREFIX: en/blog/
        run: python scripts/sync_cos_posts.py

      - name: Commit sync state & new posts
        if: steps.sync.outputs.changed == '1'
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add source/_posts .cos-sync-state.json
          git commit -m "chore(sync): pull ${{ steps.sync.outputs.count }} post(s) from COS" || echo "nothing to commit"
          git push

      - name: Setup Node
        if: steps.sync.outputs.changed == '1' || inputs.force_publish == true
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps & build
        if: steps.sync.outputs.changed == '1' || inputs.force_publish == true
        run: |
          npm ci || npm install
          npx hexo clean
          npx hexo generate

      - name: Setup SSH deploy key
        if: steps.sync.outputs.changed == '1' || inputs.force_publish == true
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy public/ to server (rsync)
        if: steps.sync.outputs.changed == '1' || inputs.force_publish == true
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes" \
            public/ root@${HOST}:/var/lib/docker/volumes/opt_hexo-public/_data/
          echo "Deployed. Verifying..."
          curl -sI --max-time 20 https://xiaohang.site/sitemap.xml | head -1

      - name: Push new URLs to Baidu (主动推送)
        if: steps.sync.outputs.changed == '1' || inputs.force_publish == true
        env:
          SITE: https://xiaohang.site
          BAIDU_PUSH_TOKEN: ${{ secrets.BAIDU_PUSH_TOKEN }}
        run: python scripts/baidu_push.py

      - name: Push new URLs to Bing (IndexNow)
        if: steps.sync.outputs.changed == '1' || inputs.force_publish == true
        env:
          SITE: https://xiaohang.site
          INDEXNOW_KEY: 9bd5098a7a404536bd8eaed9ae7c35d4
        run: python scripts/indexnow_push.py

      - name: Summary
        run: |
          echo "changed=${{ steps.sync.outputs.changed }}  count=${{ steps.sync.outputs.count }}" >> $GITHUB_STEP_SUMMARY

name: COS 读写能力诊断(一次性)

on:
  workflow_dispatch:
    inputs:
      bucket:
        description: '目标桶名'
        default: 'ml-stock-checking-1403701833'
      region:
        description: '桶所在地域'
        default: 'ap-guangzhou'

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install cos-python-sdk-v5
      - name: Probe bucket read/write
        env:
          COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
          COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
          COS_BUCKET: ${{ inputs.bucket }}
          COS_REGION: ${{ inputs.region }}
        run: python scripts/cos_probe.py

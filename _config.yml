# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: 喵喵鱼塘
subtitle: ''
description: ''
keywords:
author: Foam🍅
language: zh-CN
timezone: ''

# URL
## Set your site url here. For example, if you use GitHub Page, set url as 'https://username.github.io/project'
url: https://xiaohang.site
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: false
  trailing_html: false

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
# 分类页 URL 用英文 slug(检索友好),与文章 permalink 前缀保持一致
# 老中文分类 URL 由 scripts/redirect-alias.js 自动生成跳转页
category_map:
  AI与大模型: ai-llm
  AI编程工具: ai-coding
  Java新特性: java
  性能优化: performance
  数据库: database
  中间件与架构: architecture
  工程实践: engineering
  前端开发: frontend
  技术随笔: notes
tag_map:

# Metadata elements
meta_generator: true

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: 'mtime'

# Pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
include:
exclude:
ignore:

# Extensions
## Plugins: https://hexo.io/plugins/
## Themes: https://hexo.io/themes/
theme: butterfly

# Search
search:
  path: search.json
  field: post
  content: true

# Sitemap 索引结构 (自定义生成器 scripts/sitemap-index.js)
#   主索引 sitemap.xml -> 按年份分片的子图 sitemap-<year>.xml
#   百度专用 baidusitemap.xml 同结构 -> baidusitemap-<year>.xml
sitemap_index:
  # 索引/子图输出路径模板,{year} 会被替换
  index: sitemap.xml
  child: sitemap-{year}.xml
  baidu_index: baidusitemap.xml
  baidu_child: baidusitemap-{year}.xml
  # 是否把 分类页/标签页 也纳入(归到最新年份的子图)
  # 标签页不进 sitemap:290+ 个标签页属于薄内容,会稀释抓取配额、
  # 触发 GSC「已抓取-尚未编入索引」;页面本身仍可访问、仍有 canonical
  include_tags: false
  include_categories: true
  # 是否纳入首页/归档等静态页(归到最新年份子图)
  include_pages: true

# Deployment
## Docs: https://hexo.io/docs/one-command-deployment
deploy:
  type: git
  repo: https://github.com/FoamTomato/FoamTomato.github.io.git
  branch: master
